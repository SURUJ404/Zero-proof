services:
  build-service:
    build:
      context: .
      dockerfile: services/build-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - BUILD_SERVICE_PORT=8081
      - ZP_DATA_DIR=/data
    volumes:
      - zp-data:/data
    networks:
      - zp-net

  prover-service:
    build:
      context: .
      dockerfile: services/prover-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PROVER_SERVICE_PORT=8082
      - RISC0_DEV_MODE=${RISC0_DEV_MODE:-true}
    volumes:
      - zp-data:/data
    networks:
      - zp-net

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - BUILD_SERVICE_URL=http://build-service:8081
      - PROVER_SERVICE_URL=http://prover-service:8082
    depends_on:
      - build-service
      - prover-service
    networks:
      - zp-net

volumes:
  zp-data:

networks:
  zp-net:
