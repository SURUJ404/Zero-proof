name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  RISC0_RUST_TOOLCHAIN_VERSION: 1.94.1
  RISC0_CPP_TOOLCHAIN_VERSION: 2024.01.05

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cargo-risczero-x86_64-unknown-linux-gnu.tgz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cargo-risczero-aarch64-apple-darwin.tgz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/rustup
      - name: Build release binaries
        run: |
          cargo build -p cargo-risczero -p risc0-r0vm --release --locked
          mkdir -p tmp/pkg
          cp target/release/cargo-risczero tmp/pkg/
          cp target/release/r0vm tmp/pkg/
      - name: Package artifacts
        run: |
          cd tmp/pkg
          tar cv * | gzip -9 > ../../${{ matrix.artifact }}
      - uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.artifact }}

  release-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/rustup
      - name: Build server binary
        run: cargo build -p zk-prover-server --release --locked
      - name: Upload server binary
        uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/zk-prover-server
          asset_name: zk-prover-server-x86_64-unknown-linux-gnu

  release-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs pull
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zk-prover-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zk-prover-server:${{ github.ref_name }}
