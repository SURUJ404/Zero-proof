name: website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: website
      - name: lint
        run: npx remark . --quiet
        working-directory: website

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy to Vercel
        id: vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCELID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECTID }}
        run: |
          npx vercel@latest pull --yes --environment=production --token=${{ secrets.ZEROTOKEN }}
          npx vercel@latest build --prod --token=${{ secrets.ZEROTOKEN }}
          npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.ZEROTOKEN }} > vercel-url.txt
          echo "url=$(cat vercel-url.txt)" >> $GITHUB_OUTPUT
        working-directory: website
