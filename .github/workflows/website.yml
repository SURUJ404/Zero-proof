name: website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install latest Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        id: vercel
        env:
          BASE_URL: /
        run: |
          vercel deploy --prod \
            --token=${{ secrets.ZEROTOKEN }} \
            --scope=${{ secrets.VERCELID }} \
            --name=zero-proof \
            --yes > vercel-url.txt
          echo "url=$(cat vercel-url.txt)" >> $GITHUB_OUTPUT
        working-directory: website
