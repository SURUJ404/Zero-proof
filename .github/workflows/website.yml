name: website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install latest Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        id: vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCELID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECTID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.ZEROTOKEN }}
          vercel build --prod --token=${{ secrets.ZEROTOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.ZEROTOKEN }} > vercel-url.txt
          echo "url=$(cat vercel-url.txt)" >> $GITHUB_OUTPUT
        working-directory: website
